<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#f4f3f9" media="(prefers-color-scheme: light)">
    <meta name="theme-color" content="#000000" media="(prefers-color-scheme: dark)">
    <title>登录 - MatrixPilot</title>
    
    <link rel="apple-touch-icon" href="{{ url_for('static', filename='icon.png') }}">
    <link rel="manifest" href="{{ url_for('static', filename='manifest.json') }}">

    <style>
        * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
        
        :root {
            --app-bg: #f4f3f9; 
            --card-bg: #FFFFFF; 
            --text-main: #1C1C1E; 
            --text-sub: #A8A8A8;
            --border-color: #e5e5ea;
            --primary: #007AFF; 
            --danger: #FF3B30;
        }
        @media (prefers-color-scheme: dark) {
            :root { 
                --app-bg: #000000; 
                --card-bg: #1C1C1E; 
                --text-main: #FFFFFF; 
                --border-color: #38383A;
                --primary: #0A66C2; 
            }
        }
        
        body {
            font-family: -apple-system, "SF Pro Display", sans-serif;
            background-color: var(--app-bg); color: var(--text-main); margin: 0;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            height: 100vh; padding: 20px;
            -webkit-font-smoothing: antialiased;
        }
        
        .login-card {
            background: var(--card-bg); border-radius: 24px; padding: 40px 24px;
            width: 100%; max-width: 380px; box-shadow: none; 
            text-align: center;
        }
        
        /* 采用最新的 iOS 半透明弥散风格底色 */
        .icon-container {
            width: 72px; height: 72px; 
            background: rgba(0, 122, 255, 0.1); 
            color: var(--primary);
            border-radius: 20px; display: flex; align-items: center; justify-content: center;
            margin: 0 auto 24px auto; box-shadow: none;
        }
        
        h1 { margin: 0 0 8px 0; font-size: 26px; font-weight: 700; letter-spacing: -0.02em; }
        p { color: var(--text-sub); font-size: 15px; margin: 0 0 32px 0; }
        
        /* 提升密码框的质感，输入时圆点间距更宽更优雅 */
        .ios-input {
            background: var(--app-bg); border: 1.5px solid var(--border-color); border-radius: 14px;
            height: 54px; padding: 0 16px; font-size: 20px; font-weight: 600; color: var(--text-main);
            width: 100%; outline: none; margin-bottom: 24px; text-align: center; letter-spacing: 0.3em;
            transition: border-color 0.2s;
        }
        
        /* 占位符不再用点，直接用文字，并缩小字号与字间距 */
        .ios-input::-webkit-input-placeholder { color: var(--text-sub); opacity: 0.4; font-weight: 400; letter-spacing: normal; font-size: 16px; }
        .ios-input::-moz-placeholder { color: var(--text-sub); opacity: 0.4; font-weight: 400; letter-spacing: normal; font-size: 16px; }
        .ios-input:-ms-input-placeholder { color: var(--text-sub); opacity: 0.4; font-weight: 400; letter-spacing: normal; font-size: 16px; }
        .ios-input::placeholder { color: var(--text-sub); opacity: 0.4; font-weight: 400; letter-spacing: normal; font-size: 16px; }
        
        .ios-input:focus { border-color: var(--primary); }
        
        .ios-btn-primary { 
            background: var(--primary); color: #FFF; border: none; border-radius: 50px; 
            height: 54px; font-size: 17px; font-weight: 600; width: 100%; 
            display: flex; justify-content: center; align-items: center; cursor: pointer;
            box-shadow: none; transition: opacity 0.2s; gap: 8px;
        }
        .ios-btn-primary:active { opacity: 0.8; }
        
        .error-msg { color: var(--danger); font-size: 13px; margin-top: -12px; margin-bottom: 20px; font-weight: 500; display: flex; align-items: center; justify-content: center; gap: 4px; }
    </style>
</head>
<body>
    <div class="login-card">
        
        <div class="icon-container">
            <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
            </svg>
        </div>
        
        <h1>MatrixPilot</h1>
        <p>输入密码以解锁</p>
        
        <form action="/login" method="POST">
            <input type="password" name="pin" class="ios-input" placeholder="PASSWORD" required autofocus>
            
            {% if error %}
            <div class="error-msg">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></svg>
                {{ error }}
            </div>
            {% endif %}
            
            <button type="submit" class="ios-btn-primary">
                解锁
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"></path><path d="M12 5l7 7-7 7"></path></svg>
            </button>
        </form>
    </div>
</body>
</html>
