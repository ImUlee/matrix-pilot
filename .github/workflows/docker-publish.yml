name: Build and Push MatrixPilot Image

on:
  push:
    branches: [ "main" ] 
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # --- 关键修复步骤：将用户名转为小写并存入环境变量 ---
      - name: Set lower case owner name
        run: |
          echo "OWNER_LC=${OWNER,,}" >>${GITHUB_ENV}
        env:
          OWNER: "${{ github.repository_owner }}"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          # 使用环境变量中存储的小写名称
          tags: |
            ghcr.io/${{ env.OWNER_LC }}/matrixpilot:latest
            ghcr.io/${{ env.OWNER_LC }}/matrixpilot:${{ github.sha }}