name: Build and Push MatrixPilot Image

on:
  push:
    branches: [ "main" ] # 仅在推送到主分支时触发
  workflow_dispatch:      # 允许手动触发构建

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          # 自动生成标签：latest 和 git-sha
          tags: |
            ghcr.io/${{ github.repository_owner }}/matrixpilot:latest
            ghcr.io/${{ github.repository_owner }}/matrixpilot:${{ github.sha }}