name: Build and Push MatrixPilot

on:
  push:
    branches: [ "main" ]
    # 当 main 分支有代码推送时触发

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. 拉取代码
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. 设置 Docker Buildx (用于构建多架构镜像)
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 3. 登录 Docker Hub
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 4. 构建并推送镜像
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          # 这里会自动推送到: 你的用户名/matrixpilot:latest
          tags: ${{ secrets.DOCKER_USERNAME }}/matrixpilot:latest, ${{ secrets.DOCKER_USERNAME }}/matrixpilot:${{ github.sha }}