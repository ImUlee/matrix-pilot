<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>MatrixPilot</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default"> <meta name="apple-mobile-web-app-title" content="MatrixPilot">
    <meta name="format-detection" content="telephone=no">
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
        :root { --ios-bg: #F2F2F7; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", Arial, sans-serif;
            background-color: var(--ios-bg);
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            overflow-x: hidden;
        }
        /* iOS 毛玻璃效果 */
        .ios-blur {
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            background-color: rgba(255, 255, 255, 0.85);
        }
        .safe-bottom { padding-bottom: env(safe-area-inset-bottom); }
        .ios-tap:active { opacity: 0.6; transform: scale(0.97); transition: all 0.1s; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        /* 页面切换动画 */
        .page-content { display: none; }
        .page-active { display: block; animation: fadeIn 0.25s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="antialiased text-slate-900">

    <div id="app" class="min-h-screen pb-32">
        
        <main id="page-overview" class="page-content page-active p-5 pt-14">
            <header class="mb-6 flex justify-between items-end">
                <h1 class="text-3xl font-bold tracking-tight">总览</h1>
                <span class="text-gray-400 text-sm font-medium">MatrixPilot</span>
            </header>
            
            <div class="grid grid-cols-2 gap-3 mb-6">
                <div class="bg-white rounded-2xl shadow-sm border border-gray-100 flex flex-col items-center justify-center h-28 ios-tap">
                    <span class="text-[36px] font-bold text-blue-600 tracking-tight leading-none">128</span>
                    <span class="text-[12px] font-medium text-gray-400 mt-2">账号总和</span>
                </div>
                <div class="bg-white rounded-2xl shadow-sm border border-gray-100 flex flex-col items-center justify-center h-28 ios-tap">
                    <span class="text-[36px] font-bold text-purple-600 tracking-tight leading-none">32</span>
                    <span class="text-[12px] font-medium text-gray-400 mt-2">设备总和</span>
                </div>
                <div class="bg-white rounded-2xl shadow-sm border border-gray-100 flex flex-col items-center justify-center h-28 ios-tap">
                    <span class="text-[36px] font-bold text-green-500 tracking-tight leading-none">124</span>
                    <span class="text-[12px] font-medium text-gray-400 mt-2">正常数量</span>
                </div>
                <div class="bg-white rounded-2xl shadow-sm border border-gray-100 flex flex-col items-center justify-center h-28 ios-tap">
                    <span class="text-[36px] font-bold text-red-500 tracking-tight leading-none">4</span>
                    <span class="text-[12px] font-medium text-gray-400 mt-2">异常数量</span>
                </div>
            </div>

            <section class="bg-white p-5 rounded-3xl shadow-sm mb-6 border border-gray-100">
                <h3 class="text-xs font-bold text-gray-400 uppercase tracking-widest mb-8">新增趋势</h3>
                <div class="h-32 w-full flex items-end justify-between gap-1 px-1">
                    <div class="flex-1 flex flex-col items-center gap-1"><span class="text-[9px] font-bold text-gray-400">12</span><div class="w-full bg-blue-100 rounded-t-lg" style="height: 30px"></div></div>
                    <div class="flex-1 flex flex-col items-center gap-1"><span class="text-[9px] font-bold text-gray-400">18</span><div class="w-full bg-blue-100 rounded-t-lg" style="height: 45px"></div></div>
                    <div class="flex-1 flex flex-col items-center gap-1"><span class="text-[9px] font-bold text-gray-400">15</span><div class="w-full bg-blue-100 rounded-t-lg" style="height: 38px"></div></div>
                    <div class="flex-1 flex flex-col items-center gap-1"><span class="text-[9px] font-bold text-gray-400">22</span><div class="w-full bg-blue-200 rounded-t-lg" style="height: 55px"></div></div>
                    <div class="flex-1 flex flex-col items-center gap-1"><span class="text-[9px] font-bold text-gray-400">30</span><div class="w-full bg-blue-400 rounded-t-lg" style="height: 75px"></div></div>
                    <div class="flex-1 flex flex-col items-center gap-1"><span class="text-[9px] font-bold text-blue-600">42</span><div class="w-full bg-blue-500 rounded-t-lg" style="height: 95px"></div></div>
                    <div class="flex-1 flex flex-col items-center gap-1"><span class="text-[9px] font-bold text-blue-600">38</span><div class="w-full bg-blue-600 rounded-t-lg shadow-lg shadow-blue-100" style="height: 85px"></div></div>
                </div>
            </section>
        </main>

        <main id="page-matrix" class="page-content p-5 pt-14">
            <header class="mb-4 flex justify-between items-center">
                <h1 class="text-3xl font-bold tracking-tight">矩阵</h1>
                <button class="w-9 h-9 bg-blue-600 text-white rounded-full flex items-center justify-center text-xl font-light ios-tap shadow-lg shadow-blue-200">+</button>
            </header>

            <div class="bg-gray-200/60 p-2.5 rounded-xl flex items-center mb-6 px-4 backdrop-blur-sm">
                <svg class="w-4 h-4 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
                <input type="text" placeholder="搜索账号、设备..." class="bg-transparent border-none focus:ring-0 text-sm ml-2 w-full placeholder-gray-400 outline-none">
            </div>

            <div class="flex overflow-x-auto no-scrollbar gap-4 mb-6 pb-2">
                <div class="flex-shrink-0 flex flex-col items-center ios-tap">
                    <div class="w-14 h-14 bg-blue-600 text-white rounded-2xl flex items-center justify-center text-lg font-bold shadow-lg shadow-blue-200 mb-2">ALL</div>
                    <span class="text-[10px] font-bold text-blue-600">全部</span>
                </div>
                <div class="flex-shrink-0 flex flex-col items-center ios-tap">
                    <div class="w-14 h-14 bg-white text-black rounded-2xl flex items-center justify-center text-2xl shadow-sm border border-gray-100 mb-2">🎵</div>
                    <span class="text-[10px] font-bold text-gray-400">抖音</span>
                </div>
                <div class="flex-shrink-0 flex flex-col items-center ios-tap">
                    <div class="w-14 h-14 bg-white text-black rounded-2xl flex items-center justify-center text-2xl shadow-sm border border-gray-100 mb-2">📷</div>
                    <span class="text-[10px] font-bold text-gray-400">小红书</span>
                </div>
                <div class="flex-shrink-0 flex flex-col items-center ios-tap">
                    <div class="w-14 h-14 bg-white text-black rounded-2xl flex items-center justify-center text-2xl shadow-sm border border-gray-100 mb-2">🔥</div>
                    <span class="text-[10px] font-bold text-gray-400">快手</span>
                </div>
            </div>

            <div class="space-y-3 pb-20">
                <div class="bg-white p-4 rounded-2xl flex justify-between items-center shadow-sm border border-gray-50 ios-tap">
                    <div class="flex items-center">
                        <div class="w-10 h-10 bg-gray-100 rounded-xl mr-3 flex items-center justify-center text-lg">👤</div>
                        <div>
                            <p class="font-bold text-[15px]">User_8821</p>
                            <p class="text-[11px] text-gray-400 font-medium">iPhone 14 Pro • 正常</p>
                        </div>
                    </div>
                    <button class="px-3 py-1 bg-blue-50 text-blue-600 rounded-full text-[12px] font-bold">修改</button>
                </div>
                <div class="bg-white p-4 rounded-2xl flex justify-between items-center shadow-sm border border-gray-50 ios-tap">
                    <div class="flex items-center">
                        <div class="w-10 h-10 bg-gray-100 rounded-xl mr-3 flex items-center justify-center text-lg">👤</div>
                        <div>
                            <p class="font-bold text-[15px]">User_9902</p>
                            <p class="text-[11px] text-gray-400 font-medium">iPad Air 5 • 异常</p>
                        </div>
                    </div>
                    <button class="px-3 py-1 bg-blue-50 text-blue-600 rounded-full text-[12px] font-bold">修改</button>
                </div>
            </div>
        </main>

        <main id="page-admin" class="page-content p-5 pt-14">
            <header class="mb-6">
                <h1 class="text-3xl font-bold tracking-tight">管理</h1>
            </header>

            <div class="space-y-6">
                <section>
                    <h3 class="text-xs font-bold text-gray-400 uppercase tracking-widest px-4 mb-2">配置</h3>
                    <div class="bg-white rounded-2xl shadow-sm overflow-hidden border border-gray-100">
                        <div class="p-4 flex justify-between items-center border-b border-gray-50 ios-tap">
                            <span class="font-medium text-[15px]">账号模板</span>
                            <svg class="w-4 h-4 text-gray-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M9 5l7 7-7 7"/></svg>
                        </div>
                        <div class="p-4 flex justify-between items-center ios-tap">
                            <span class="font-medium text-[15px]">自定义字段</span>
                            <span class="text-sm text-gray-400">3 个</span>
                        </div>
                    </div>
                </section>

                <section>
                    <h3 class="text-xs font-bold text-gray-400 uppercase tracking-widest px-4 mb-2">系统</h3>
                    <div class="bg-white rounded-2xl shadow-sm overflow-hidden border border-gray-100">
                        <div class="p-4 flex justify-between items-center border-b border-gray-50">
                            <span class="font-medium text-[15px]">暗黑模式</span>
                            <div class="w-11 h-6 bg-gray-200 rounded-full relative transition-colors duration-200"><div class="absolute left-0.5 top-0.5 w-5 h-5 bg-white rounded-full shadow-sm transform transition-transform duration-200"></div></div>
                        </div>
                        <div class="p-4 flex justify-between items-center ios-tap">
                            <span class="font-medium text-[15px]">关于 MatrixPilot</span>
                            <span class="text-sm text-gray-400">v1.0.2</span>
                        </div>
                    </div>
                </section>
            </div>
        </main>
    </div>

    <nav class="fixed bottom-0 left-0 right-0 ios-blur border-t border-gray-200/50 safe-bottom z-50">
        <div class="flex justify-around items-center h-16">
            <button onclick="switchPage('overview')" id="tab-overview" class="tab-btn flex flex-col items-center ios-tap text-blue-600 transition-colors">
                <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 24 24"><path d="M3 13h8V3H3v10zm0 8h8v-6H3v6zm10 0h8V11h-8v10zm0-18v6h8V3h-8z"/></svg>
                <span class="text-[10px] mt-1 font-bold">总览</span>
            </button>
            <button onclick="switchPage('matrix')" id="tab-matrix" class="tab-btn flex flex-col items-center ios-tap text-gray-400 transition-colors">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M4 6h16M4 12h16m-7 6h7"/></svg>
                <span class="text-[10px] mt-1 font-bold">矩阵</span>
            </button>
            <button onclick="switchPage('admin')" id="tab-admin" class="tab-btn flex flex-col items-center ios-tap text-gray-400 transition-colors">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M12 6V4m0 2a2 2 0 100 4m0-4a2 2 0 110 4m-6 8a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4m6 6v10m6-2a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4"/></svg>
                <span class="text-[10px] mt-1 font-bold">管理</span>
            </button>
        </div>
    </nav>

    <script>
        function switchPage(pageId) {
            document.querySelectorAll('.page-content').forEach(p => p.classList.remove('page-active'));
            document.getElementById('page-' + pageId).classList.add('page-active');
            
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.classList.replace('text-blue-600', 'text-gray-400');
                btn.querySelector('svg').setAttribute('fill', 'none');
                btn.querySelector('svg').setAttribute('stroke', 'currentColor');
            });
            
            const activeBtn = document.getElementById('tab-' + pageId);
            activeBtn.classList.replace('text-gray-400', 'text-blue-600');
            // 特殊处理：总览图标是填充的，其他是描边的，这里简化处理，你可以根据svg微调
            if(pageId === 'overview') {
                 activeBtn.querySelector('svg').setAttribute('fill', 'currentColor');
                 activeBtn.querySelector('svg').removeAttribute('stroke');
            }
        }

        // 注册 Service Worker
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('./sw.js')
                .then(() => console.log('MatrixPilot SW Ready'))
                .catch(err => console.log('SW Fail:', err));
        }
    </script>
</body>
</html>
